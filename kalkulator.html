<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Kalkulator Nilai</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="kalkulator.css">
</head>
<body>

<nav>
    <div class="brand">Portofolio Saya</div>
    <ul>
        <li><a href="index.html">Tentang Saya</a></li>
        <li><a href="kalkulator.html" class="active">Kalkulator Nilai</a></li>
    </ul>
</nav>

<div class="container">

    <div class="card">
        <h2>Kalkulator Nilai Semester</h2>
        
        <p class="bobot-info">
            <strong>Bobot Penilaian:</strong> Tugas 30% | UTS 30% | UAS 40%
        </p>

        <label for="tugas">Nilai Tugas</label>
        <input type="number" id="tugas" min="0" max="100" placeholder="Contoh: 80">

        <label for="uts">Nilai UTS</label>
        <input type="number" id="uts" min="0" max="100" placeholder="Contoh: 85">

        <label for="uas">Nilai UAS</label>
        <input type="number" id="uas" min="0" max="100" placeholder="Contoh: 90">

        <button id="btnHitung">Hitung Nilai</button>

        <div id="error" class="error"></div>

        <div id="hasil" class="hasil">
            <h3 id="nilaiAkhir"></h3>
            <h4 id="grade"></h4>
        </div>
    </div>

</div>

<script src="kalkulator.js"></script>
</body>
</html>
